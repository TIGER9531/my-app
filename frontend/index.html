<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShortLink</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>✨ ShortLink</h1>

  <div class="input-group">
    <input id="longUrl" type="text" placeholder="Paste your long URL here">
    <button id="shortenBtn">Shorten URL ✨</button>
  </div>

  <div id="result" style="display:none;">
    <input id="shortenedUrl" readonly>
    <button id="copyBtn">Copy</button>
    <button id="closeResult">Close</button>
    <div id="clickCount"></div>
    <div id="expiryInfo"></div>
    <div id="qrCodeContainer"></div>
  </div>

  <div>
    <h2>Recent Links</h2>
    <div id="recentLinksList">Loading...</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
