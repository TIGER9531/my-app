<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ShortLink - Modern URL Shortener</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>✨ ShortLink</h1>
      <p>Shorten your URLs with style. Fast, reliable, and free.</p>
    </header>

    <div class="card">
      <div class="input-group">
        <label for="longUrl">Paste your long URL here</label>
        <div class="url-input-wrapper">
          <input 
            type="url" 
            id="longUrl" 
            placeholder="https://example.com/very/long/url/that/needs/shortening"
            autocomplete="off"
          >
          <button id="shortenBtn" class="btn-primary">Shorten URL ✨</button>
        </div>
      </div>

      <div class="options-group">
        <details>
          <summary>Advanced Options</summary>
          <div class="advanced-options">
            <div class="option">
              <label for="customAlias">Custom Alias (optional)</label>
              <input 
                type="text" 
                id="customAlias" 
                placeholder="my-custom-link"
                pattern="[a-zA-Z0-9]{3,20}"
                title="3-20 alphanumeric characters only"
              >
              <small>Only letters and numbers, 3-20 characters</small>
            </div>
            <div class="option">
              <label for="expiresIn">Expires In (days)</label>
              <select id="expiresIn">
                <option value="">Never expires</option>
                <option value="1">1 day</option>
                <option value="7">7 days</option>
                <option value="30">30 days</option>
                <option value="90">90 days</option>
              </select>
            </div>
          </div>
        </details>
      </div>

      <div id="result" class="result" style="display: none;">
        <div class="result-header">
          <h3>🎉 Your shortened URL is ready!</h3>
          <button id="closeResult" class="close-btn">&times;</button>
        </div>
        <div class="shortened-link-container">
          <input type="text" id="shortenedUrl" readonly>
          <button id="copyBtn" class="btn-secondary">Copy</button>
        </div>
        <div id="qrCodeContainer" class="qr-code-container"></div>
        <div class="stats-preview">
          <span id="clickCount">0 clicks</span>
          <span id="expiryInfo">Never expires</span>
        </div>
      </div>
    </div>

    <div class="recent-links-section">
      <h2>📊 Recent Links</h2>
      <div id="recentLinksList" class="recent-links-list">
        <div class="loading">Loading recent links...</div>
      </div>
    </div>

    <footer>
      <p>⚡ Fast & Free URL Shortener | Track clicks | QR Codes | Custom Aliases</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
